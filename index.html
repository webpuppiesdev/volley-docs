<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volley — Documentation</title>
  <meta name="description" content="Volley email marketing platform documentation" />
  <link rel="icon" href="https://webpuppies.com.sg/wp-content/uploads/2020/02/Full-Logo.svg" type="image/svg+xml" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Docsify base theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />

  <style>
    :root {
      /* Brand */
      --brand-primary: #6366F1;
      --brand-primary-light: #818CF8;
      --brand-primary-dark: #4F46E5;
      --brand-primary-bg: #EEF2FF;
      --brand-gradient: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A78BFA 100%);
      --brand-gradient-subtle: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%);

      /* Neutrals */
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --gray-900: #111827;

      /* Docsify overrides */
      --theme-color: var(--brand-primary);
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.75;
      --base-color: var(--gray-700);
      --base-background-color: #FFFFFF;
      --code-font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --code-font-size: 13px;
      --code-inline-color: var(--brand-primary-dark);
      --code-inline-background: var(--brand-primary-bg);
      --sidebar-width: 280px;
      --sidebar-background: var(--gray-50);
      --sidebar-border-color: var(--gray-200);
      --sidebar-nav-link-color: var(--gray-600);
      --sidebar-nav-link-color--active: var(--brand-primary);
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: var(--brand-primary);
      --sidebar-name-color: var(--gray-900);
      --sidebar-name-font-weight: 800;
      --sidebar-nav-strong-color: var(--gray-400);
      --heading-color: var(--gray-900);
      --heading-font-weight: 700;
      --blockquote-border-color: var(--brand-primary);
      --blockquote-background: var(--brand-primary-bg);
      --blockquote-color: var(--brand-primary-dark);
      --search-input-border-color: var(--gray-200);
      --search-input-background-color: #fff;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: #fff;
    }

    /* ═══════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════ */
    .sidebar {
      border-right: 1px solid var(--gray-200) !important;
      background: var(--gray-50) !important;
      padding-top: 0 !important;
    }

    /* Logo in sidebar */
    .sidebar .app-name-link {
      display: flex !important;
      align-items: center !important;
      gap: 10px;
      padding: 20px 20px 16px !important;
      text-decoration: none !important;
    }

    .sidebar .app-name-link img {
      height: 28px;
      width: auto;
    }

    .sidebar .search {
      padding: 0 16px 12px !important;
    }

    .sidebar .search input {
      border-radius: 8px !important;
      border: 1px solid var(--gray-200) !important;
      padding: 8px 12px !important;
      font-size: 13px !important;
      background: #fff !important;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .sidebar .search input:focus {
      border-color: var(--brand-primary) !important;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1) !important;
      outline: none !important;
    }

    .sidebar ul li a {
      font-size: 14px !important;
      padding: 6px 20px !important;
      border-radius: 0 !important;
      transition: all 0.15s;
    }

    .sidebar ul li a:hover {
      color: var(--brand-primary) !important;
      background: rgba(99, 102, 241, 0.04) !important;
    }

    .sidebar ul li.active > a {
      border-left: 3px solid var(--brand-primary) !important;
      background: rgba(99, 102, 241, 0.06) !important;
      font-weight: 600 !important;
    }

    .sidebar ul li > p {
      font-size: 11px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      font-weight: 600 !important;
      color: var(--gray-400) !important;
      padding: 16px 20px 4px !important;
      margin: 0 !important;
    }

    /* ═══════════════════════════════════════════
       CONTENT AREA
       ═══════════════════════════════════════════ */
    .markdown-section {
      max-width: 860px !important;
      padding: 40px 48px 80px !important;
    }

    .markdown-section h1 {
      font-size: 2em;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--gray-900);
      margin-top: 0;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gray-100);
    }

    .markdown-section h2 {
      font-size: 1.5em;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--gray-900);
      margin-top: 2.5em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-100);
    }

    .markdown-section h3 {
      font-size: 1.15em;
      font-weight: 600;
      color: var(--gray-800);
      margin-top: 2em;
    }

    .markdown-section blockquote {
      background: var(--brand-gradient-subtle);
      border-left: 4px solid var(--brand-primary);
      border-radius: 0 12px 12px 0;
      padding: 16px 20px;
      margin: 1.5em 0;
      color: var(--gray-700);
      font-size: 14.5px;
    }

    .markdown-section blockquote p {
      margin: 0;
    }

    .markdown-section a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .markdown-section a:hover {
      color: var(--brand-primary-dark);
      text-decoration: underline;
    }

    /* ═══════════════════════════════════════════
       TABLES
       ═══════════════════════════════════════════ */
    .markdown-section table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      margin: 1.5em 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
      font-size: 14px;
    }

    .markdown-section th {
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-700);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .markdown-section td {
      padding: 10px 16px;
      color: var(--gray-600);
      border-bottom: 1px solid var(--gray-100);
    }

    .markdown-section tr:last-child td {
      border-bottom: none;
    }

    .markdown-section tr:hover td {
      background: rgba(99, 102, 241, 0.02);
    }

    .markdown-section th:first-child {
      border-top-left-radius: 10px;
    }

    .markdown-section th:last-child {
      border-top-right-radius: 10px;
    }

    /* ═══════════════════════════════════════════
       CODE BLOCKS
       ═══════════════════════════════════════════ */
    .markdown-section pre {
      background: var(--gray-900) !important;
      border-radius: 12px !important;
      padding: 20px 24px !important;
      margin: 1.5em 0 !important;
      border: 1px solid var(--gray-800) !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    .markdown-section pre code {
      color: #E5E7EB !important;
      white-space: pre !important;
      tab-size: 4;
      font-size: 13px !important;
      line-height: 1.6 !important;
    }

    .markdown-section code {
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 13px;
    }

    .docsify-copy-code-button {
      border-radius: 6px !important;
      font-size: 12px !important;
      background: var(--gray-700) !important;
      color: var(--gray-300) !important;
    }

    /* ═══════════════════════════════════════════
       MERMAID DIAGRAMS
       ═══════════════════════════════════════════ */
    .mermaid {
      text-align: center;
      margin: 2em 0;
      padding: 24px;
      background: var(--gray-50);
      border-radius: 12px;
      border: 1px solid var(--gray-200);
    }

    .mermaid svg {
      max-width: 100%;
    }

    /* ═══════════════════════════════════════════
       LISTS
       ═══════════════════════════════════════════ */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 1.5em;
    }

    .markdown-section li {
      margin: 0.4em 0;
      color: var(--gray-600);
    }

    .markdown-section li strong {
      color: var(--gray-800);
    }

    .markdown-section hr {
      border: none;
      border-top: 1px solid var(--gray-200);
      margin: 3em 0;
    }

    /* ═══════════════════════════════════════════
       COVER PAGE
       ═══════════════════════════════════════════ */
    section.cover {
      background: var(--brand-gradient) !important;
      min-height: 100vh;
    }

    section.cover .cover-main {
      max-width: 640px;
      text-align: center;
    }

    /* Cover logo */
    section.cover .cover-main > p:first-child img {
      height: 48px;
      width: auto;
      margin-bottom: 16px;
      filter: brightness(0) invert(1);
    }

    section.cover h1 {
      font-size: 3.5em !important;
      font-weight: 800 !important;
      letter-spacing: -0.04em;
      color: #fff !important;
      border: none !important;
      margin-bottom: 0 !important;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
    }

    section.cover blockquote {
      background: none !important;
      border: none !important;
      color: rgba(255, 255, 255, 0.85) !important;
      font-size: 1.15em !important;
      padding: 0 !important;
      max-width: 480px;
      margin: 0 auto;
    }

    section.cover blockquote p {
      color: rgba(255, 255, 255, 0.85) !important;
    }

    section.cover .cover-main > p:last-child a {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.2s;
      margin: 4px;
    }

    section.cover .cover-main > p:last-child a:first-child {
      background: #fff;
      color: var(--brand-primary-dark);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    section.cover .cover-main > p:last-child a:first-child:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    section.cover .cover-main > p:last-child a:last-child {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    section.cover .cover-main > p:last-child a:last-child:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    section.cover::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    section.cover::before {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════
       HOMEPAGE CARDS
       ═══════════════════════════════════════════ */
    .doc-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin: 1.5em 0;
    }

    .doc-card {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
      text-decoration: none !important;
      display: block;
      background: #fff;
    }

    .doc-card:hover {
      border-color: var(--brand-primary-light);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08);
      transform: translateY(-2px);
    }

    .doc-card .card-icon {
      font-size: 1.6em;
      margin-bottom: 8px;
      display: block;
    }

    .doc-card .card-title {
      font-weight: 600;
      color: var(--gray-900);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .doc-card .card-desc {
      color: var(--gray-500);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════════
       PAGINATION
       ═══════════════════════════════════════════ */
    .docsify-pagination-container {
      border-top: 1px solid var(--gray-200) !important;
      margin-top: 3em !important;
      padding-top: 1.5em !important;
    }

    .pagination-item-label {
      font-size: 12px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
      color: var(--gray-400) !important;
    }

    .pagination-item-title {
      color: var(--brand-primary) !important;
      font-weight: 600 !important;
    }

    /* ═══════════════════════════════════════════
       SCROLLBAR
       ═══════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gray-400);
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 24px 20px 60px !important;
      }

      .markdown-section h1 {
        font-size: 1.6em;
      }

      .markdown-section h2 {
        font-size: 1.3em;
      }

      .markdown-section pre {
        border-radius: 8px !important;
        padding: 14px 16px !important;
      }

      .doc-cards {
        grid-template-columns: 1fr;
      }

      section.cover h1 {
        font-size: 2.2em !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: '<img src="https://webpuppies.com.sg/wp-content/uploads/2020/02/Full-Logo.svg" alt="Webpuppies" style="height:26px;width:auto;" /> <span style="color:var(--gray-300);font-weight:300;margin:0 6px;">|</span> <span style="font-weight:700;color:var(--gray-800);font-size:0.95em;">Volley</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
      },
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          },
        },
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      fontFamily: 'Inter, sans-serif',
      themeVariables: {
        primaryColor: '#EEF2FF',
        primaryTextColor: '#1F2937',
        primaryBorderColor: '#6366F1',
        lineColor: '#9CA3AF',
        secondaryColor: '#F5F3FF',
        tertiaryColor: '#F9FAFB',
      },
    });

    window.$docsify.plugins = [
      function (hook) {
        hook.doneEach(function () {
          document.querySelectorAll('.mermaid').forEach(function (el) {
            el.removeAttribute('data-processed');
          });
          try {
            mermaid.run();
          } catch (e) {
            console.warn('Mermaid render error:', e);
          }
        });
      },
    ];
  </script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
