<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volley — Documentation</title>
  <meta name="description" content="Volley email marketing platform documentation" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏐</text></svg>" />
  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <style>
    :root {
      --theme-color: #4A90D9;
      --base-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;
      --code-font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      --code-font-size: 13px;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #4A90D9;
      --sidebar-name-font-weight: 700;
      --cover-background-color: #4A90D9;
    }

    /* Cover page styling */
    .cover-main {
      max-width: 700px;
    }

    /* Make ASCII art boxes not wrap */
    pre code {
      white-space: pre !important;
      tab-size: 4;
    }

    /* Mermaid diagram centering */
    .mermaid {
      text-align: center;
      margin: 1.5em 0;
    }

    /* Better table styling */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }

    th, td {
      border: 1px solid #e2e8f0;
      padding: 8px 12px;
      text-align: left;
    }

    th {
      background: #f7fafc;
      font-weight: 600;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    /* Status badges */
    td:last-child {
      white-space: nowrap;
    }

    /* Sidebar logo */
    .app-name-link {
      font-size: 1.2em !important;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --theme-color: #6BA5E7;
      }
      th {
        background: #2d3748;
      }
      tr:nth-child(even) {
        background: #1a202c;
      }
      th, td {
        border-color: #4a5568;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '🏐 Volley',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
      },
      // Mermaid rendering
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          },
        },
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
    });

    // Re-render mermaid after Docsify loads each page
    const observer = new MutationObserver(function () {
      document.querySelectorAll('.mermaid').forEach(function (el) {
        if (el.getAttribute('data-processed')) return;
        try {
          mermaid.run({ nodes: [el] });
        } catch (e) {
          console.warn('Mermaid render error:', e);
        }
      });
    });

    // Docsify hook for mermaid rendering
    window.$docsify.plugins = [
      function (hook) {
        hook.doneEach(function () {
          document.querySelectorAll('.mermaid').forEach(function (el) {
            el.removeAttribute('data-processed');
          });
          try {
            mermaid.run();
          } catch (e) {
            console.warn('Mermaid render error:', e);
          }
        });
      },
    ];
  </script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
