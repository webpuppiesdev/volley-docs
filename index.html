<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volley — Documentation</title>
  <meta name="description" content="Volley email marketing platform documentation — a product by Webpuppies" />
  <link rel="icon" href="https://media.licdn.com/dms/image/v2/D560BAQHpFxUy3PTYLw/company-logo_200_200/B56ZeMIOLeGQAI-/0/1750402663823/webpuppies_logo?e=2147483647&v=beta&t=4cHHzf-GbL9yPZIOxV02G1gk0zSrUAGV_ocfw8mQSqk" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />

  <style>
    :root {
      --brand: #7C3AED; --brand-light: #A78BFA; --brand-dark: #6D28D9;
      --brand-50: #F5F3FF; --brand-100: #EDE9FE;
      --brand-gradient: linear-gradient(135deg, #7C3AED 0%, #A855F7 100%);
      --brand-gradient-soft: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 50%, #FDF4FF 100%);
      --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-300: #D1D5DB; --gray-400: #9CA3AF; --gray-500: #6B7280;
      --gray-600: #4B5563; --gray-700: #374151; --gray-800: #1F2937;
      --gray-900: #111827; --gray-950: #030712;

      --theme-color: var(--brand);
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --base-font-size: 15px; --base-line-height: 1.75;
      --base-color: var(--gray-700); --base-background-color: #FFFFFF;
      --code-font-family: 'JetBrains Mono', monospace; --code-font-size: 13px;
      --code-inline-color: var(--brand-dark); --code-inline-background: var(--brand-50);
      --sidebar-width: 272px; --sidebar-background: #fff;
      --sidebar-nav-link-color: var(--gray-500);
      --sidebar-nav-link-color--active: var(--brand);
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-name-color: var(--gray-900); --sidebar-name-font-weight: 800;
      --sidebar-nav-strong-color: var(--gray-400);
      --heading-color: var(--gray-900); --heading-font-weight: 700;
      --blockquote-border-color: var(--brand);
      --blockquote-background: var(--brand-50);
      --blockquote-color: var(--brand-dark);
      --search-input-border-color: var(--gray-200);
      --search-input-background-color: var(--gray-50);
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #fff; }
    /* Smooth scroll only on main content area, not html (breaks Docsify hash routing) */
    .content, main { scroll-behavior: smooth; }

    /* ── SIDEBAR (light) ── */
    .sidebar { border-right: 1px solid var(--gray-100) !important; background: #fff !important; padding-top: 0 !important; }
    .sidebar .app-name-link {
      display: flex !important; align-items: center !important; gap: 10px;
      padding: 20px 20px 12px !important; text-decoration: none !important;
      position: relative;
    }
    .sidebar .app-name-link::after {
      content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, var(--brand), rgba(124,58,237,0.2), transparent);
    }
    .sidebar .app-name-link img.sidebar-logo { height: 28px; width: 28px; }
    .sidebar-branding {
      padding: 0 20px 10px;
      font-size: 10px; color: var(--gray-400);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .sidebar-branding span { color: var(--gray-500); font-weight: 500; }
    .sidebar .search { padding: 12px 16px !important; }
    .sidebar .search input {
      border-radius: 10px !important; border: 1px solid var(--gray-200) !important;
      padding: 9px 14px !important; font-size: 13px !important;
      background: var(--gray-50) !important; transition: all 0.2s;
    }
    .sidebar .search input:focus {
      border-color: var(--brand) !important;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.08) !important;
      background: #fff !important; outline: none !important;
    }
    .sidebar .search input::placeholder { color: var(--gray-400) !important; }
    .sidebar-nav { padding-bottom: 20px !important; }
    .sidebar ul li a {
      font-size: 13.5px !important; padding: 5px 20px !important;
      transition: all 0.12s; border-left: 2px solid transparent !important;
    }
    .sidebar ul li a:hover {
      color: var(--brand) !important; background: var(--brand-50) !important;
      border-left-color: var(--brand-light) !important;
    }
    .sidebar ul li.active > a,
    .sidebar-nav a.spy-active {
      border-left: 2px solid var(--brand) !important;
      background: var(--brand-50) !important;
      color: var(--brand-dark) !important; font-weight: 600 !important;
    }
    .sidebar ul li > p {
      font-size: 10px !important; text-transform: uppercase !important;
      letter-spacing: 0.1em !important; font-weight: 700 !important;
      color: var(--gray-400) !important; padding: 20px 20px 4px !important; margin: 0 !important;
    }

    /* ── CONTENT (light) ── */
    .markdown-section { max-width: 840px !important; padding: 44px 52px 100px !important; }
    .markdown-section h1 {
      font-size: 2.1em; font-weight: 800; letter-spacing: -0.035em;
      color: var(--gray-950); padding-bottom: 16px; border-bottom: none; line-height: 1.2; margin-top: 0;
    }
    .markdown-section h2 {
      font-size: 1.45em; font-weight: 700; letter-spacing: -0.025em;
      color: var(--gray-900); margin-top: 3em; padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-100);
    }
    .markdown-section h3 { font-size: 1.1em; font-weight: 600; color: var(--gray-800); margin-top: 2em; }
    .markdown-section > p { color: var(--gray-600); line-height: 1.8; }
    .markdown-section strong { color: var(--gray-800); font-weight: 600; }
    .markdown-section blockquote {
      background: var(--brand-gradient-soft); border-left: 3px solid var(--brand);
      border-radius: 0 10px 10px 0; padding: 14px 18px; margin: 1.5em 0;
      color: var(--gray-600); font-size: 14px;
    }
    .markdown-section blockquote p { margin: 0; }
    .markdown-section a { color: var(--brand); text-decoration: none; font-weight: 500; transition: color 0.15s; }
    .markdown-section a:hover { color: var(--brand-dark); text-decoration: underline; }

    /* ── TABLES (light) ── */
    .markdown-section table {
      border-collapse: separate; border-spacing: 0; width: 100%; margin: 1.5em 0;
      border-radius: 12px; overflow: hidden; border: 1px solid var(--gray-200); font-size: 13.5px;
    }
    .markdown-section th {
      background: var(--gray-50); font-weight: 600; color: var(--gray-500);
      padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--gray-200);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .markdown-section td { padding: 10px 16px; color: var(--gray-600); border-bottom: 1px solid var(--gray-50); }
    .markdown-section tr:last-child td { border-bottom: none; }
    .markdown-section tr:hover td { background: var(--brand-50); }

    /* ── CODE (dark blocks on light page) ── */
    .markdown-section pre {
      background: var(--gray-950) !important; border-radius: 12px !important;
      padding: 20px 24px !important; margin: 1.5em 0 !important;
      border: 1px solid rgba(255,255,255,0.06) !important;
      box-shadow: 0 8px 24px -4px rgba(0,0,0,0.12);
    }
    .markdown-section pre code {
      color: #D1D5DB !important; white-space: pre !important; tab-size: 4;
      font-size: 13px !important; line-height: 1.65 !important;
    }
    .markdown-section code { border-radius: 6px; padding: 2px 7px; font-size: 12.5px; font-weight: 500; }
    .docsify-copy-code-button {
      border-radius: 8px !important; font-size: 11px !important;
      background: rgba(255,255,255,0.08) !important; color: var(--gray-400) !important;
      border: 1px solid rgba(255,255,255,0.1) !important; padding: 4px 10px !important;
    }

    /* ── MERMAID (light) ── */
    .mermaid {
      text-align: center; margin: 2em 0; padding: 28px 24px;
      background: var(--gray-50); border-radius: 14px; border: 1px solid var(--gray-200);
    }
    .mermaid svg { max-width: 100%; }

    /* ── MISC (light) ── */
    .markdown-section ul, .markdown-section ol { padding-left: 1.5em; }
    .markdown-section li { margin: 0.4em 0; color: var(--gray-600); }
    .markdown-section li strong { color: var(--gray-800); }
    .markdown-section hr { border: none; border-top: 1px solid var(--gray-100); margin: 3em 0; }

    /* ══════════════════════════════════════════════
       COVER PAGE — dark, matching Volley login
       ══════════════════════════════════════════════ */
    section.cover {
      background: #030712 !important;
      min-height: 100vh; position: relative; overflow: hidden;
    }
    /* Subtle purple glow - bottom edge only */
    section.cover::after {
      content: ''; position: absolute; bottom: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 400px; border-radius: 50%;
      background: rgba(124, 58, 237, 0.12); filter: blur(120px);
      pointer-events: none;
    }
    /* Very faint purple tint - bottom right corner */
    section.cover::before {
      content: ''; position: absolute; bottom: -100px; right: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: rgba(168, 85, 247, 0.06); filter: blur(100px);
      pointer-events: none;
    }
    section.cover .cover-main {
      max-width: 720px; text-align: center; position: relative; z-index: 1;
    }
    section.cover .cover-main > p:first-child img {
      height: 96px; width: 96px; margin-bottom: 32px;
      filter: drop-shadow(0 4px 24px rgba(124, 58, 237, 0.5));
    }
    section.cover h1 {
      font-size: 5.5em !important; font-weight: 900 !important;
      letter-spacing: -0.05em; border: none !important;
      margin-bottom: 0 !important; line-height: 1.05 !important;
      color: #fff !important;
    }
    section.cover blockquote {
      background: none !important; border: none !important;
      color: rgba(255,255,255,0.5) !important;
      font-size: 1.2em !important; padding: 0 !important;
      max-width: 520px; margin: 20px auto 0; line-height: 1.7 !important;
    }
    section.cover blockquote p { color: rgba(255,255,255,0.5) !important; }
    /* "Powered by" line */
    section.cover .cover-main > p:nth-child(2) {
      font-size: 13px !important; color: rgba(255,255,255,0.25) !important;
      margin-top: 0 !important; margin-bottom: 12px !important;
      letter-spacing: 0.03em;
    }
    section.cover .cover-main > p:nth-child(2) a {
      color: rgba(255,255,255,0.35) !important; text-decoration: none !important;
    }
    section.cover .cover-main > p:nth-child(2) a:hover {
      color: rgba(255,255,255,0.6) !important;
    }
    /* CTA buttons */
    section.cover .cover-main > p:last-child a {
      display: inline-block; padding: 16px 44px; border-radius: 14px;
      font-weight: 600; font-size: 16px; text-decoration: none !important;
      transition: all 0.2s; margin: 6px;
    }
    section.cover .cover-main > p:last-child a:first-child {
      background: linear-gradient(135deg, #7C3AED, #A855F7);
      color: #fff; box-shadow: 0 4px 24px rgba(124, 58, 237, 0.45);
    }
    section.cover .cover-main > p:last-child a:first-child:hover {
      transform: translateY(-2px); box-shadow: 0 8px 36px rgba(124, 58, 237, 0.55);
    }
    section.cover .cover-main > p:last-child a:last-child {
      background: transparent; color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.15);
    }
    section.cover .cover-main > p:last-child a:last-child:hover {
      background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    /* ── CARDS (light) ── */
    .doc-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; margin: 1.5em 0; }
    .doc-card {
      border: 1px solid var(--gray-200); border-radius: 14px; padding: 22px;
      transition: all 0.2s ease; text-decoration: none !important;
      display: block; background: #fff; position: relative; overflow: hidden;
    }
    .doc-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--brand-gradient); opacity: 0; transition: opacity 0.2s;
    }
    .doc-card:hover {
      border-color: var(--brand-light); box-shadow: 0 8px 24px -4px rgba(124,58,237,0.1);
      transform: translateY(-3px);
    }
    .doc-card:hover::before { opacity: 1; }
    .doc-card .card-icon {
      font-size: 1.5em; margin-bottom: 10px; display: inline-block;
      background: var(--brand-50); padding: 8px; border-radius: 10px; line-height: 1;
    }
    .doc-card .card-title { font-weight: 700; color: var(--gray-900); font-size: 14.5px; margin-bottom: 6px; }
    .doc-card .card-desc { color: var(--gray-500); font-size: 13px; line-height: 1.55; }

    /* ── PAGINATION ── */
    .docsify-pagination-container { border-top: 1px solid var(--gray-100) !important; margin-top: 3em !important; padding-top: 1.5em !important; }
    .pagination-item-label { font-size: 11px !important; text-transform: uppercase !important; letter-spacing: 0.08em !important; color: var(--gray-400) !important; font-weight: 600 !important; }
    .pagination-item-title { color: var(--brand) !important; font-weight: 600 !important; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 10px; }

    /* ── PAGE FOOTER ── */
    .powered-by-footer {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 20px; margin-top: 4em; color: var(--gray-400);
      font-size: 12px; border-top: 1px solid var(--gray-100);
    }
    .powered-by-footer img { height: 20px; width: 20px; border-radius: 5px; opacity: 0.7; }
    .powered-by-footer a { color: var(--gray-500) !important; font-weight: 600; text-decoration: none !important; }
    .powered-by-footer a:hover { color: var(--brand) !important; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .markdown-section { padding: 24px 20px 80px !important; }
      .markdown-section h1 { font-size: 1.7em; }
      .markdown-section h2 { font-size: 1.3em; }
      .doc-cards { grid-template-columns: 1fr; }
      section.cover h1 { font-size: 3em !important; }
      section.cover .cover-main > p:first-child img { height: 72px; width: 72px; }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    var WP_LOGO = 'https://media.licdn.com/dms/image/v2/D560BAQHpFxUy3PTYLw/company-logo_200_200/B56ZeMIOLeGQAI-/0/1750402663823/webpuppies_logo?e=2147483647&v=beta&t=4cHHzf-GbL9yPZIOxV02G1gk0zSrUAGV_ocfw8mQSqk';

    window.$docsify = {
      name: '<img class="sidebar-logo" src="logo.svg" alt="" style="height:28px;width:28px;" /> <span style="font-weight:800;color:#111827;font-size:1.05em;letter-spacing:-0.02em;">Volley</span>',
      nameLink: '/',
      repo: false,
      loadSidebar: true,
      coverpage: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found',
        depth: 3,
      },
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          },
        },
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      fontFamily: 'Inter, sans-serif',
      themeVariables: {
        primaryColor: '#F5F3FF',
        primaryTextColor: '#1F2937',
        primaryBorderColor: '#7C3AED',
        lineColor: '#9CA3AF',
        secondaryColor: '#EDE9FE',
        tertiaryColor: '#F9FAFB',
      },
    });

    // Scroll-spy: highlight sidebar link matching the visible heading
    var spyObserver = null;
    function initScrollSpy() {
      if (spyObserver) spyObserver.disconnect();
      var headings = document.querySelectorAll('.markdown-section h1[id], .markdown-section h2[id], .markdown-section h3[id]');
      if (!headings.length) return;

      spyObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          var id = entry.target.getAttribute('id');
          if (!id) return;
          // Remove active from all sidebar links
          document.querySelectorAll('.sidebar-nav a').forEach(function (a) {
            a.classList.remove('spy-active');
            var li = a.closest('li');
            if (li) li.classList.remove('active');
          });
          // Find and activate matching sidebar link
          var hash = '#/' + window.location.hash.split('?')[0].split('#/')[1];
          if (hash) hash = hash.split('?')[0];
          document.querySelectorAll('.sidebar-nav a').forEach(function (a) {
            var href = a.getAttribute('href') || '';
            if (href.indexOf('#' + id) !== -1 || href.indexOf('/' + id) !== -1) {
              a.classList.add('spy-active');
              var li = a.closest('li');
              if (li) li.classList.add('active');
              // Scroll sidebar to show active item
              a.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
          });
        });
      }, {
        rootMargin: '-80px 0px -60% 0px',
        threshold: 0
      });

      headings.forEach(function (h) { spyObserver.observe(h); });
    }

    window.$docsify.plugins = [
      function (hook) {
        hook.doneEach(function () {
          // Mermaid
          document.querySelectorAll('.mermaid').forEach(function (el) {
            el.removeAttribute('data-processed');
          });
          try { mermaid.run(); } catch (e) {}

          // Init scroll spy after content renders
          setTimeout(initScrollSpy, 200);
        });

        hook.ready(function () {
          // Sidebar branding
          var branding = document.createElement('div');
          branding.className = 'sidebar-branding';
          branding.textContent = 'Powered by ';
          var brand = document.createElement('span');
          brand.textContent = 'Webpuppies';
          branding.appendChild(brand);
          branding.appendChild(document.createTextNode(' \u00B7 AWS'));
          var appName = document.querySelector('.sidebar .app-name-link');
          if (appName && appName.parentNode) {
            appName.parentNode.insertBefore(branding, appName.nextSibling);
          }
        });

        hook.afterEach(function (html) {
          return html
            + '<div class="powered-by-footer">'
            + '<img src="' + WP_LOGO + '" alt="Webpuppies" />'
            + 'Powered by <a href="https://webpuppies.com.sg" target="_blank" rel="noopener">Webpuppies</a> \u00B7 <a href="https://aws.amazon.com" target="_blank" rel="noopener">AWS</a>'
            + '</div>';
        });
      },
    ];
  </script>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
